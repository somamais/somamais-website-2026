<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma+ Tecnologia | Logo Showcase</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #A49274;
            --primary-dark: #8c7a5e;
            --bg: #000000;
            --surface: #111111;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 100%;
        }

        /* Ambient Background */
        .ambient-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(164, 146, 116, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: 1;
            filter: blur(60px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 3rem;
            display: inline-block;
            padding: 3rem;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 1px;
            background: linear-gradient(to bottom right, rgba(164, 146, 116, 0.3), transparent, rgba(164, 146, 116, 0.1));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .logo-img {
            max-width: 400px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(164, 146, 116, 0.2));
            transition: all 0.5s ease;
        }

        .logo-wrapper:hover .logo-img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 30px rgba(164, 146, 116, 0.4));
        }

        .content {
            animation: fadeIn 1.5s ease-out 0.5s both;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 1rem 2.5rem;
            background-color: var(--primary);
            color: black;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(164, 146, 116, 0.3);
        }

        .btn:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(164, 146, 116, 0.5);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Grid Background Overlay */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(164, 146, 116, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="ambient-light"></div>

    <div class="container">
        <div class="logo-wrapper">
            <!-- Usando o logo do projeto -->
            <img src="/logo-soma.png" alt="Soma+ Logo" class="logo-img">
        </div>

        <div class="content">
            <h1>Definitivamente Premium.</h1>
            <p>Integramos sua marca com a excelência visual que ela merece. Design estratégico para um futuro inteligente.</p>
            <a href="/" class="btn">Voltar ao Site Principal</a>
        </div>
    </div>
</body>
</html>
