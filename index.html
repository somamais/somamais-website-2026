<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soma+ | Inteligência Artificial e Soluções Digitais</title>
    
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      .splash-logo {
        width: 200px;
        height: auto;
        animation: pulse-logo 2s infinite ease-in-out;
      }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      .loading-bar {
        width: 150px;
        height: 2px;
        background: rgba(164, 146, 116, 0.2);
        margin-top: 20px;
        position: relative;
        overflow: hidden;
        border-radius: 2px;
      }
      .loading-bar::after {
        content: '';
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #A49274;
        animation: loading 1.5s infinite;
      }
      @keyframes loading {
        0% { left: -100%; }
        100% { left: 100%; }
      }
    </style>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Soma Mais Tecnologia (Soma+) é especializada em Soluções Digitais, Inteligência Artificial, Integrações, Automações e Produtos como Manydesk, Soma Clinic IA e Port Fácil." />
    <meta name="keywords" content="Soma+, Soma Mais Tecnologia, Inteligência Artificial, IA, Chatbot, Automação, Manydesk, Soma Clinic IA, Port Fácil, Desenvolvimento de Software" />
    <meta name="author" content="Soma Mais Tecnologia" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://somamais.ia.br/" />
    <meta property="og:title" content="Soma+ | Inteligência Artificial e Soluções Digitais" />
    <meta property="og:description" content="Transforme o atendimento e a gestão da sua empresa com as nossas soluções de IA, Integrações e Automações." />
    
    <!-- Google Analytics (Placeholder) - Descomente e adicione seu ID -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script> -->
  </head>
  <body>
    <div id="app-splash">
      <img src="/logo-soma.png" alt="Soma+" class="splash-logo" />
      <div class="loading-bar"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', () => {
        const splash = document.getElementById('app-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(() => {
            splash.style.visibility = 'hidden';
          }, 500);
        }
      });
    </script>
  </body>
</html>
